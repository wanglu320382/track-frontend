# 示例：前端构建产物部署在「站点根目录下的 track 子目录」时
# 将 dist 目录「内部文件」整体放到服务器上的 /path/to/site/track/ 下，例如：
#   /path/to/site/track/index.html
#   /path/to/site/track/assets/*.js
#
# 把下面 root 改成你机器上「站点根」的真实路径（即包含 track 文件夹的那一层）

server {
    listen 80;
    server_name _;

    # 站点根：其下应有子目录 track/（内容为 dist 解压结果）
    root /path/to/site;

    # 关键：先让真实存在的 .js/.css 等静态文件直接返回，避免被回退成 index.html（否则会报 MIME text/html）
    location ^~ /track/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /track/ {
        try_files $uri $uri/ /track/index.html;
    }
}

# 若前端挂在站点根路径（访问 https://host/ 而非 https://host/track/）：
# 1) .env.production 中设置 VITE_APP_BASE=/
# 2) 将 dist 内容放到 root 对应目录，并使用类似：
#
# root /path/to/site;
# location ^~ /assets/ {
#     try_files $uri =404;
# }
# location / {
#     try_files $uri $uri/ /index.html;
# }
